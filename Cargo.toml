[workspace]
members = [
    "robo-ui",
    "crates/robo-core",
    "crates/robo-camera",
    "crates/robo-vision",
    "crates/robo-solver",
    "crates/robo-translator",
    "crates/robo-transport",
    "crates/robo-pipeline",
]
resolver = "2"

[workspace.package]
edition = "2021"
version = "0.1.0"
authors = ["wa"]

[workspace.dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
